# تشغيل محلي فقط — لا يُستخدم في Coolify
services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      DB_HOST: db
      APP_URL: http://localhost:8080
      APP_DEBUG: "true"
      SETUP_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-rec_attendance}
      MYSQL_USER: ${DB_USER:-rec}
      MYSQL_PASSWORD: ${DB_PASS:-change_me_strong_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_local_dev}
    volumes:
      - rec_mysql_local:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  rec_mysql_local:
