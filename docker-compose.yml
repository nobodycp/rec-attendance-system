services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-rec_attendance}
      MYSQL_USER: ${DB_USER:-rec}
      MYSQL_PASSWORD: ${DB_PASS:-change_me_strong_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
